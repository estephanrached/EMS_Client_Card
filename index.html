<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS Training — Client Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f3ef;
      --surface: #ffffff;
      --surface2: #f9f8f5;
      --border: #e2e0d8;
      --border2: #ccc9be;
      --text: #1a1916;
      --text2: #6b6860;
      --text3: #9c9a93;
      --accent: #1a1916;
      --accent-light: #f0efe9;
      --green: #2d6a4f;
      --red: #c0392b;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page-wrap { max-width: 780px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.05em; flex-shrink: 0;
    }

    .header-text h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    .header-text p { font-size: 13px; color: var(--text2); margin-top: 2px; }

    .btn-new {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      font-weight: 600; cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-new:hover { opacity: 0.85; }

    /* Search */
    .search-wrap { margin-bottom: 1.25rem; }
    .search-wrap input {
      width: 100%; padding: 10px 14px;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface); color: var(--text); outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent); }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem 1.25rem;
    }
    .stat-label { font-size: 12px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 28px; font-weight: 600; margin-top: 4px; letter-spacing: -0.02em; }

    /* Client list */
    .section-label {
      font-size: 12px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    .client-list { display: flex; flex-direction: column; gap: 8px; }

    .client-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex; align-items: center;
      padding: 1rem 1.25rem; gap: 14px;
      animation: fadeUp 0.3s ease both;
      transition: border-color 0.15s;
    }
    .client-card:hover { border-color: var(--border2); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--text2);
      flex-shrink: 0;
    }

    .client-info { flex: 1; min-width: 0; }
    .client-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .client-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .btn-edit {
      padding: 7px 16px;
      font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500;
      border: 1px solid var(--border2); border-radius: var(--radius-sm);
      background: var(--surface2); color: var(--text);
      cursor: pointer; text-decoration: none;
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-edit:hover { background: var(--accent-light); border-color: var(--accent); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 4rem 2rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .empty-icon { font-size: 40px; margin-bottom: 1rem; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-sub { font-size: 14px; color: var(--text2); }

    /* Loading */
    .loading {
      text-align: center; padding: 3rem;
      color: var(--text2); font-size: 14px;
    }
    .loading-dot {
      display: inline-block; width: 6px; height: 6px;
      background: var(--text3); border-radius: 50%;
      margin: 0 2px; animation: bounce 1.2s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* Error */
    .error-state {
      text-align: center; padding: 2rem;
      background: #fdf0ee; border: 1px solid #f5c4b3;
      border-radius: var(--radius); color: var(--red); font-size: 14px;
    }

    @media (max-width: 500px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>

<div class="page-wrap">

  <div class="header">
    <div class="header-left">
      <div class="logo">EMS</div>
      <div class="header-text">
        <h1>Client Dashboard</h1>
        <p>EMS Training — all client records</p>
      </div>
    </div>
    <a href="form.html" class="btn-new">+ New Client</a>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total clients</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Added this month</div>
      <div class="stat-value" id="statMonth">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">With goals set</div>
      <div class="stat-value" id="statGoals">—</div>
    </div>
  </div>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search clients by name..." oninput="filterClients()">
  </div>

  <div class="section-label" id="listLabel">Clients</div>

  <div class="client-list" id="clientList">
    <div class="loading">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
  </div>

</div>

<script>
  const WEBHOOK = 'https://script.google.com/macros/s/AKfycbyf-hsBPdvyVvBgAm7jz4JRk08UZDthjaQPOHBNwDs9fvhO_TbgdiMuoYsITJANHsKB/exec';
  let allClients = [];

  function getInitials(first, last) {
    return ((first?.[0] || '') + (last?.[0] || '')).toUpperCase() || '?';
  }

  function renderClients(clients) {
    const list = document.getElementById('clientList');
    document.getElementById('listLabel').textContent = `Clients (${clients.length})`;

    if (clients.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">👤</div>
          <div class="empty-title">No clients found</div>
          <div class="empty-sub">Try a different search or add a new client.</div>
        </div>`;
      return;
    }

    list.innerHTML = clients.map((c, i) => `
      <div class="client-card" style="animation-delay:${i * 0.04}s">
        <div class="avatar">${getInitials(c.firstName, c.lastName)}</div>
        <div class="client-info">
          <div class="client-name">${c.firstName} ${c.lastName}</div>
          <div class="client-meta">${c.dob ? 'DOB: ' + c.dob : ''}${c.goals ? ' · ' + c.goals.substring(0, 40) + (c.goals.length > 40 ? '...' : '') : ''}</div>
        </div>
        <a href="form.html?row=${c.row}" class="btn-edit">Edit</a>
      </div>
    `).join('');
  }

  function filterClients() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allClients.filter(c =>
      (c.firstName + ' ' + c.lastName).toLowerCase().includes(q)
    );
    renderClients(filtered);
  }

  function updateStats(clients) {
    document.getElementById('statTotal').textContent = clients.length;
    const thisMonth = clients.filter(c => {
      if (!c.timestamp) return false;
      const d = new Date(c.timestamp);
      const now = new Date();
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).length;
    document.getElementById('statMonth').textContent = thisMonth;
    const withGoals = clients.filter(c => c.goals && c.goals.trim()).length;
    document.getElementById('statGoals').textContent = withGoals;
  }

  function loadClients() {
    fetch(WEBHOOK + '?action=getAll')
      .then(r => r.json())
      .then(data => {
        if (data && data.clients) {
          allClients = data.clients;
          updateStats(allClients);
          renderClients(allClients);
        } else {
          showError('No data returned from server.');
        }
      })
      .catch(err => {
        showError('Could not load clients. Make sure the Apps Script is deployed correctly.');
      });
  }

  function showError(msg) {
    document.getElementById('clientList').innerHTML = `<div class="error-state">${msg}</div>`;
  }

  loadClients();
</script>
</body>
</html>
